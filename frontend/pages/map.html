<!DOCTYPE html>
<html>
<head>
  <title>Kavach Map</title>
   <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""/>
    <link rel="stylesheet" href="/css/style.css"/>
  <style>
    #map { height: 100vh; width: 100%; }
  </style>
</head>
<body id="mapi">
    <nav id="map-nav">
  <div style="display:flex;align-items:center;gap:0.5rem;">
    <div class="logo">Kav<span>ach</span></div>
  </div>
  <div class="nav-links">
    <a href="/map">Map</a>
    <a href="/alerts">Alerts</a>
    <a href="/dashboard" class="active">My Alerts</a>
  </div>
  <div class="nav-right">
    <a href="/logout" class="logout-link">Logout</a>
  </div>
</nav>
  <div id="map"></div>
    <button type="button" id="rprt">REPORT</button>
    <div id="form" class="hidden">
    <form action="/api/alerts" method="POST">
    <input type="text" id="title" required/><br><br>
    <input type="radio" value="Emergency" name="type"  required/><label for="Emergency">Emergency</label>
    <input type="radio" value="nonemergency" name="type" required/><label for="nonemergency">nonemergency</label><br><br>
    <input type="text" id="location" required/><br><br>
    <input type="text" id="remarks" required/><br><br>
    <input type="radio" value="active" name="status" required/><label for="active">Active</label>
    <input type="radio" value="nonactive" name="status" required/><label for="nonactive">non active</label><br><br>
    <button type="button" id="submit">Submit</button>
  </form>
    </div>
   <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
  <script src="/js/map.js"></script>
  <script src="/socket.io/socket.io.js"></script>
<script src="/js/socket.js"></script>
</body>
</html>
