
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kavach — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
  
<a href="/" class="top-logo">Kav<span>ach</span></a>

<div class="card">
  <div class="card-icon">⚔️</div>
  <div class="card-title">Welcome back</div>
  <div class="card-sub">Sign in to your Kavach account to view and report campus alerts.</div>

  <div class="kiit-note">🎓 Only KIIT email addresses (@kiit.ac.in) are allowed</div>

  <div class="error-msg" id="errorMsg">Invalid email or password. Please try again.</div>

  <form action="/api/auth/login" method="POST">
    <div class="form-group">
      <label>KIIT Email</label>
      <input type="email" name="username" placeholder="yourmail@kiit.ac.in" required id="mail"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter your password" required  id="pass"/>
    </div>
    <button type="submit" class="submit-btn" id="submit-btn">Sign in</button>
  </form>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">or</div>
    <div class="divider-line"></div>
  </div>

  <div class="footer-link">
    Don't have an account? <a href="/register">Create one</a>
  </div>
</div>
 <script src="../js/login.js"></script>
</body>
</html>
